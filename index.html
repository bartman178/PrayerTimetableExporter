<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tawa Prayer Timetable Exporter</title>

  <!-- Used to export the timetable as a PNG -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root {
      --blue-dark: #003366;
      --blue-main: #007a99;
      --page-bg: #f2f4f7;
      --white: #ffffff;
      --text: #111111;
      --table-width: 1500px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--page-bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-weight: bold;
      margin: 0;
      padding: 24px;
    }

    .controls {
      max-width: 1100px;
      margin: 0 auto 20px auto;
      background: var(--white);
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 1rem;
      color: var(--blue-dark);
    }

    .controls input {
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid #bbbbbb;
      border-radius: 8px;
      min-width: 170px;
    }

    .controls button {
      padding: 11px 18px;
      font-size: 1rem;
      font-weight: bold;
      background: var(--blue-main);
      color: var(--white);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .controls button:hover {
      background: #005f78;
    }

    .status {
      max-width: 1100px;
      margin: 12px auto 18px auto;
      text-align: center;
      color: var(--blue-dark);
      min-height: 24px;
    }

    /*
      Preview wrapper only.
      The PNG export captures only the table itself to avoid white borders,
      grey artifacts, or forced canvas stretching.
    */
    #export-area {
      width: var(--table-width);
      background: transparent;
      margin: 0 auto;
      padding: 0;
      border-radius: 0;
      box-shadow: none;
    }

    #weekly-prayer-table {
      width: 100%;
    }

    /* Heading hidden so it is not included in the screenshot */
    #weekly-prayer-table h2 {
      display: none;
    }

    #weekly-prayer-table table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 2.25em;
      background-color: var(--white);
      border-radius: 18px;
      overflow: hidden;
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.18),
        0 4px 10px rgba(0, 0, 0, 0.10);
    }

    #weekly-prayer-table thead tr {
      background-color: var(--blue-main);
      color: var(--white);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #weekly-prayer-table th,
    #weekly-prayer-table td {
      padding: 28px 10px;
      text-align: center;
      border-bottom: 1px solid #dddddd;
      border-right: 1px solid #000000;
      line-height: 1.15;
    }

    #weekly-prayer-table tbody tr:last-child td {
      border-bottom: none;
    }

    #weekly-prayer-table tbody tr.highlight-row {
      background-color: var(--blue-dark);
      color: var(--white);
      font-weight: bold;
    }

    #weekly-prayer-table th:first-child,
    #weekly-prayer-table td:first-child {
      border-left: none;
    }

    #weekly-prayer-table th:last-child,
    #weekly-prayer-table td:last-child {
      border-right: none;
    }

    @media (max-width: 1600px) {
      #export-area {
        transform: scale(0.62);
        transform-origin: top center;
        margin-bottom: -350px;
      }
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      .controls {
        align-items: stretch;
      }

      .controls input,
      .controls button {
        width: 100%;
      }

      #export-area {
        transform: scale(0.42);
        margin-bottom: -520px;
      }
    }

    @media print {
      body {
        background: var(--white);
        padding: 0;
      }

      .controls,
      .status {
        display: none;
      }

      #export-area {
        box-shadow: none;
        margin: 0;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <div class="controls">
    <label for="start-date">Start date:</label>
    <input type="date" id="start-date" />

    <button type="button" id="generate-button">Generate</button>
    <button type="button" id="download-button">Download PNG</button>
  </div>

  <div class="status" id="status"></div>

  <div id="export-area">
    <div id="weekly-prayer-table">
      <h2>Prayer Times for the Next 7 Days</h2>
      <div id="prayer-table-placeholder">Loading weekly prayer times...</div>
    </div>
  </div>

  <script>
    const sheetID = "1AunLHACQEUcIeIrcwXafAEpVn1dq39gLGJVIyL8QzV0";
    const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

    function parseLocalDate(dateText) {
      const parts = dateText.split("-");
      return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    }

    function parseSheetDate(value) {
      const textValue = String(value || "");
      const parts = textValue.split("/");

      // Sheet dates are expected as month/day/year, for example 4/15/2026.
      return new Date(Number(parts[2]), Number(parts[0]) - 1, Number(parts[1]));
    }

    function dateOnly(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatDisplayDate(date) {
      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${day}/${month}`;
    }

    function formatTime(cell) {
      const fullTime = cell?.f || cell?.v || "";
      return String(fullTime).split(":").slice(0, 2).join(":");
    }

    function setDefaultDateFromUrlOrToday() {
      const params = new URLSearchParams(window.location.search);
      const urlDate = params.get("date");
      const input = document.getElementById("start-date");

      if (urlDate) {
        input.value = urlDate;
        return;
      }

      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      input.value = `${yyyy}-${mm}-${dd}`;
    }

    async function loadWeeklyPrayerTimes() {
      const status = document.getElementById("status");
      const container = document.getElementById("prayer-table-placeholder");
      const selectedDateText = document.getElementById("start-date").value;

      if (!selectedDateText) {
        status.textContent = "Please select a start date.";
        return;
      }

      const selectedDate = dateOnly(parseLocalDate(selectedDateText));

      status.textContent = "Loading prayer times...";
      container.textContent = "Loading weekly prayer times...";

      try {
        const res = await fetch(sheetUrl);

        if (!res.ok) {
          throw new Error(`Google Sheet request failed: ${res.status}`);
        }

        const text = await res.text();
        const jsonStart = text.indexOf("{");
        const jsonEnd = text.lastIndexOf("}");

        if (jsonStart === -1 || jsonEnd === -1) {
          throw new Error("Could not parse Google Sheet response.");
        }

        const jsonText = text.substring(jsonStart, jsonEnd + 1);
        const json = JSON.parse(jsonText);
        const rows = json.table.rows || [];

        const parsedRows = rows
          .map(row => {
            const dateCell = row.c[0];
            if (!dateCell) return null;

            const dateStr = dateCell.f || dateCell.v;
            const date = parseSheetDate(dateStr);

            if (isNaN(date.getTime())) return null;

            return {
              date,
              dateStr,
              times: row.c.slice(1, 7).map(formatTime)
            };
          })
          .filter(row => row && dateOnly(row.date) >= selectedDate)
          .sort((a, b) => a.date - b.date);

        const next7 = parsedRows.slice(0, 7);

        if (next7.length === 0) {
          container.textContent = "No prayer times found for that date.";
          status.textContent = "No matching rows found in the Google Sheet.";
          return;
        }

        const table = document.createElement("table");

        const thead = document.createElement("thead");
        thead.innerHTML = `
          <tr>
            <th>Date</th>
            <th>Fajr</th>
            <th>Sunrise</th>
            <th>Dhuhr</th>
            <th>Asr</th>
            <th>Maghrib</th>
            <th>Isha</th>
          </tr>
        `;

        const tbody = document.createElement("tbody");

        next7.forEach(row => {
          const tr = document.createElement("tr");

          if (dateOnly(row.date).getTime() === selectedDate.getTime()) {
            tr.classList.add("highlight-row");
          }

          tr.innerHTML = `
            <td>${formatDisplayDate(row.date)}</td>
            ${row.times.map(time => `<td>${time}</td>`).join("")}
          `;

          tbody.appendChild(tr);
        });

        table.appendChild(thead);
        table.appendChild(tbody);

        container.innerHTML = "";
        container.appendChild(table);

        status.textContent = `Generated timetable from ${selectedDateText}.`;
      } catch (error) {
        console.error(error);
        container.textContent = "Failed to load weekly data.";
        status.textContent = "Check that the Google Sheet is publicly accessible and that the sheet name is Sheet1.";
      }
    }

    async function downloadPng() {
      const status = document.getElementById("status");
      const selectedDateText = document.getElementById("start-date").value || "selected-date";

      try {
        if (typeof html2canvas === "undefined") {
          throw new Error("html2canvas did not load. Check your internet connection or CDN access.");
        }

        const table = document.querySelector("#weekly-prayer-table table");

        if (!table) {
          throw new Error("No timetable table found. Generate the timetable first.");
        }

        status.textContent = "Generating PNG...";

        /*
          Export only the table.
          This removes the grey artifact, prevents a white border, avoids fixed canvas stretching,
          and preserves the rounded corners and table shadow.
        */
        const canvas = await html2canvas(table, {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          logging: false
        });

        const link = document.createElement("a");
        link.download = `tawa-prayer-times-${selectedDateText}.png`;
        link.href = canvas.toDataURL("image/png");

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        status.textContent = `Downloaded PNG for ${selectedDateText}.`;
      } catch (error) {
        console.error(error);
        status.textContent = "Failed to generate PNG. Open the browser console for details.";
        alert("Failed to generate PNG. Check the browser console for details.");
      }
    }

    window.addEventListener("load", () => {
      setDefaultDateFromUrlOrToday();
      loadWeeklyPrayerTimes();

      document.getElementById("generate-button").addEventListener("click", loadWeeklyPrayerTimes);
      document.getElementById("download-button").addEventListener("click", downloadPng);
    });
  </script>
</body>
</html>
